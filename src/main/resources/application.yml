spring:
  application:
    name: OwnerManualRAG

  ai:
    openai:
        api-key: ${OPENAI_API_KEY}

        read-timeout: 30s

        chat:
          # Default empty (:) so when GROQ_* are unset we get "" and @NotBlank fails fast with a clear message
          api-key: ${GROQ_API_KEY:}
          base-url: https://api.groq.com/openai 
          read-timeout: 30s
          options:
            model: ${GROQ_MODEL:}  
            max-tokens: 1024
            temperature: 0.1
            
        embedding:
          api-key: ${OPENAI_API_KEY:}
          options:
            model: text-embedding-3-small
            dimensions: 384

    vectorstore:
      qdrant:
        host: ${QDRANT_URL:}  # localhost if using Qdrant locally
        port: 6334              # The gRPC port (default is 6334)
        api-key: ${QDRANT_API_KEY:} # required for Qdrant Cloud; can be empty for local
        use-tls: ${QDRANT_USE_TLS:false} # Set to true if using Qdrant Cloud
        initialize-schema: true # Automatically creates the collection if it doesn't exist
        collection-name: owners_manual_rag


  datasource:
    url: ${SUPABASE_DB_URL:}
    username: ${SUPABASE_DB_USERNAME:}
    password: ${SUPABASE_DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true


app:
  query:
    top-k: 5
    max-context-chars: 8000  # Cap total chunk text sent to LLM (context window)

  security:
    api-key: ${APP_API_KEY:}
    rate-limiting:
      capacity: 60
      refill-tokens: 60
      refill-period-seconds: 60 

logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: always

resilience4j:
  retry:
    instances:
      llm:
        max-attempts: 1              # Default: no retry (LLM is expensive)
        wait-duration: 250ms
      vectorSearch:
        max-attempts: 2              # 1 retry (transient network hiccup)
        wait-duration: 150ms
      vectorUpsert:
        max-attempts: 3              # 2 retries (ingestion can tolerate more delay)
        wait-duration: 250ms
      documentFetch:
        max-attempts: 2              # 1 retry fetching PDFs
        wait-duration: 300ms
  circuitbreaker:
    instances:
      llm:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      vectorSearch:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 30
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
      vectorUpsert:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 30
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      documentFetch:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      llm:
        timeout-duration: 15s        # Upper bound for LLM call time from QueryService
        cancel-running-future: true      